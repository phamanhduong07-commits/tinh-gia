version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: tinh_gia_db
      POSTGRES_USER: np_user
      POSTGRES_PASSWORD: np_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://np_user:np_password_change_me@db:5432/tinh_gia_db
      SECRET_KEY: change-this-secret-key-in-production-minimum-32-chars
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:3000,https://your-domain.com"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
